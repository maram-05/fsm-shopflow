# ================================================
#  SHOPFLOW — Configuration principale (H2 / dev)
# ================================================

# --- Nom de l'application ---
spring.application.name=ShopFlow

# ================================================
#  BASE DE DONNÉES H2 (fichier — mode dev)
#  Les données sont sauvegardées dans un fichier
#  Pour revenir en mémoire, change file: → mem:
# ================================================
spring.datasource.url=jdbc:h2:file:./data/shopflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 — accessible sur http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ================================================
#  JPA / HIBERNATE
# ================================================
# update : garde les données entre les redémarrages
# create-drop : recrée les tables à chaque démarrage
spring.jpa.hibernate.ddl-auto=update

# Affiche les requêtes SQL dans la console (utile pour déboguer)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecte H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ================================================
#  SERVEUR
# ================================================
server.port=8080

# ================================================
#  JWT — Configuration des tokens
#  IMPORTANT : Change cette clé secrète en prod !
#  Elle doit faire au moins 32 caractères.
# ================================================
app.jwt.secret=ShopFlowSecretKey2025PourLesTokensJWTTresLongs
# 24 heures = 86400000 ms (pour développement)
app.jwt.access-token-expiration=86400000
# 7 jours = 604800000 ms
app.jwt.refresh-token-expiration=604800000

# ================================================
#  SWAGGER / OPENAPI — DÉVELOPPEMENT UNIQUEMENT
#  ⚠️  ACCÈS LIMITÉ AUX ADMINISTRATEURS
#  Interface disponible sur : http://localhost:8080/swagger-ui/index.html
# ================================================
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs

# Message de sécurité
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config

# ================================================
#  LOGS
# ================================================
logging.level.com.shopflow=DEBUG
logging.level.org.springframework.security=DEBUG