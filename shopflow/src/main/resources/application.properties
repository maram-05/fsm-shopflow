# ================================================
#  SHOPFLOW — Configuration principale (H2 / dev)
# ================================================

# --- Nom de l'application ---
spring.application.name=ShopFlow

# ================================================
#  BASE DE DONNÉES H2 (en mémoire — mode dev)
#  La base est recréée à chaque démarrage.
#  Pour garder les données, change create-drop → update
# ================================================
spring.datasource.url=jdbc:h2:mem:shopflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 — accessible sur http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ================================================
#  JPA / HIBERNATE
# ================================================
# create-drop : recrée les tables à chaque démarrage (parfait pour le dev)
spring.jpa.hibernate.ddl-auto=create-drop

# Affiche les requêtes SQL dans la console (utile pour déboguer)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecte H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ================================================
#  SERVEUR
# ================================================
server.port=8080

# ================================================
#  JWT — Configuration des tokens
#  IMPORTANT : Change cette clé secrète en prod !
#  Elle doit faire au moins 32 caractères.
# ================================================
app.jwt.secret=ShopFlowSecretKey2025PourLesTokensJWTTresLongs
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# ================================================
#  SWAGGER / OPENAPI
#  Interface disponible sur : http://localhost:8080/swagger-ui/index.html
# ================================================
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/api-docs

# ================================================
#  LOGS
# ================================================
logging.level.com.shopflow=DEBUG
logging.level.org.springframework.security=DEBUG