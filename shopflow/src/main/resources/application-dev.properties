# ================================================
#  SHOPFLOW — Configuration DÉVELOPPEMENT
# ================================================

# --- Base de données H2 ---
spring.datasource.url=jdbc:h2:mem:shopflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 activée
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA Développement ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- SWAGGER ACTIVÉ POUR LE DÉVELOPPEMENT ---
# ⚠️ Accès limité aux administrateurs via SecurityConfig
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs

# --- Logs détaillés ---
logging.level.com.shopflow=DEBUG
logging.level.org.springframework.security=DEBUG

# --- JWT (clé de dev - à changer en prod) ---
app.jwt.secret=ShopFlowSecretKey2025PourLesTokensJWTTresLongs
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000